name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Copy frontend dist to Lightsail
        uses: appleboy/scp-action@v0
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          source: "frontend/dist"
          target: "~/bill-advisor-dist"

      - name: Deploy to Lightsail
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          envs: ANTHROPIC_API_KEY,ESIOS_TOKEN
          script: |
            rm -rf ~/bill-advisor
            git clone git@github.com:RaulRC/bill-advisor.git ~/bill-advisor
            rm -rf ~/bill-advisor/frontend/dist
            cp -r ~/bill-advisor-dist/frontend/dist ~/bill-advisor/frontend/dist
            cd ~/bill-advisor
            docker build -t bill-advisor .
            docker stop bill-advisor || true
            docker rm bill-advisor || true
            docker run -d --restart unless-stopped \
              -p 80:8000 \
              -p 8001:8001 \
              -e ANTHROPIC_API_KEY="$ANTHROPIC_API_KEY" \
              -e ESIOS_TOKEN="$ESIOS_TOKEN" \
              -v ~/bill-advisor-logs:/app/logs \
              --name bill-advisor \
              bill-advisor
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ESIOS_TOKEN: ${{ secrets.ESIOS_TOKEN }}
